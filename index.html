<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoic Ambience | @meditations.acepe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #070908;
            --accent-color: #3d7a56;
            --accent-hover: #4e9c6e;
            --accent-glow: rgba(61, 122, 86, 0.25);
            --text-main: #f0f0f0;
            --text-muted: #8a8f8d;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.08);
            
            --font-heading: 'Syne', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-mono);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Orbs */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 50vw;
            height: 50vw;
            background-color: var(--accent-color);
            top: -20%;
            left: -10%;
        }

        .orb-2 {
            width: 40vw;
            height: 40vw;
            background-color: #142e20;
            bottom: -10%;
            right: -10%;
            animation-delay: -5s;
            animation-direction: alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.9); }
        }

        /* Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Header Section */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .header-titles {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .warning-bar {
            background-color: var(--accent-color);
            color: var(--bg-color);
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-weight: 700;
            letter-spacing: 0.05em;
            display: inline-block;
            align-self: flex-start;
            margin-bottom: 0.5rem;
        }

        header h1 {
            font-family: var(--font-heading);
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            border-left: 2px solid var(--accent-color);
            padding-left: 1rem;
            margin-top: 0.5rem;
        }

        .btn-channel {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--accent-color);
            padding: 1rem 2rem;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 4px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-channel:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Huge Player Section */
        .player-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            width: 100%;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .now-playing {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .now-playing-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent-color);
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 var(--accent-glow); }
            70% { box-shadow: 0 0 0 8px rgba(61, 122, 86, 0); }
            100% { box-shadow: 0 0 0 0 rgba(61, 122, 86, 0); }
        }

        .current-title {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Grid Section */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .section-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .video-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .video-card:hover, .video-card.active {
            border-color: var(--accent-color);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px var(--accent-glow);
            background: var(--surface-hover);
        }

        .thumbnail-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            background: #111;
        }

        .thumbnail-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .video-card:hover .thumbnail-wrapper img {
            opacity: 0.8;
        }

        .card-info {
            padding: 1rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-title {
            font-family: var(--font-heading);
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .hidden {
            display: none !important;
        }

        .message-box {
            grid-column: 1 / -1;
            padding: 2rem;
            text-align: center;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 8px;
            color: #ff8888;
        }

        .loading-spinner {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: var(--accent-color);
            font-size: 1.2rem;
            font-family: var(--font-mono);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 { font-size: 2.5rem; }
            .header-section { flex-direction: column; align-items: flex-start; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .current-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="container">
        <!-- Header Section -->
        <header class="header-section">
            <div class="header-titles">
                <div class="warning-bar">channel is locked, no rabbit holes</div>
                <h1>Stoic Ambience.</h1>
                <p class="subtitle">// @meditations.acepe<br>· no algorithm · no escape · just work</p>
            </div>
            <button id="btn-full-catalog" class="btn-channel">
                Load Full Catalog ↓
            </button>
        </header>

        <!-- Huge Player Section -->
        <div class="player-container">
            <div class="video-wrapper">
                <iframe id="yt-player" 
                        src="" 
                        title="YouTube video player" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                </iframe>
            </div>
            <div class="now-playing">
                <div class="now-playing-label">
                    <div class="pulse"></div> Now Playing
                </div>
                <div id="current-title" class="current-title">Initializing...</div>
            </div>
        </div>

        <!-- Dynamic Content Grid -->
        <main class="main-content">
            <div class="section-header">
                <h2 id="grid-section-title" class="section-title">Latest Archives</h2>
            </div>
            <div id="video-grid" class="grid">
                <!-- Videos injected here via JS -->
            </div>
        </main>
    </div>

    <script>
        // Configuration
        const API_KEY = 'AIzaSyCubEB4VWGofjhJli1FAf2L4hmyq5WN8Gc';
        const CHANNEL_HANDLE = '@meditations.acepe';
        
        // State
        let channelId = null;
        let isInitialLoad = true;
        let currentlyPlayingId = null;

        // DOM Elements
        const grid = document.getElementById('video-grid');
        const ytPlayer = document.getElementById('yt-player');
        const currentTitleEl = document.getElementById('current-title');
        const gridSectionTitle = document.getElementById('grid-section-title');
        const btnFullCatalog = document.getElementById('btn-full-catalog');

        // Helper: Decode HTML entities in YouTube titles
        function decodeHTML(html) {
            const txt = document.createElement('textarea');
            txt.innerHTML = html;
            return txt.value;
        }

        // Helper: Format Dates
        function formatDate(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        // UI: Show Error
        function showError(message) {
            grid.innerHTML = `<div class="message-box">Error: ${message}</div>`;
            if (isInitialLoad) currentTitleEl.textContent = "Offline.";
        }

        // UI: Show Loading
        function showLoading(message = "Connecting to the void...") {
            grid.innerHTML = `<div class="loading-spinner">${message}</div>`;
        }

        // API Call 1: Get Channel ID from Handle
        async function fetchChannelId() {
            const cleanHandle = CHANNEL_HANDLE.startsWith('@') ? CHANNEL_HANDLE : `@${CHANNEL_HANDLE}`;
            let url = `https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${cleanHandle}&key=${API_KEY}`;
            let response = await fetch(url);
            
            if (!response.ok) throw new Error(`API Error: ${response.status}`);
            
            let data = await response.json();
            if (data.items && data.items.length > 0) {
                return data.items[0].id;
            }
            
            // Fallback Search
            url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(CHANNEL_HANDLE)}&type=channel&maxResults=1&key=${API_KEY}`;
            response = await fetch(url);
            
            if (!response.ok) throw new Error(`API Error: ${response.status}`);
            
            data = await response.json();
            if (data.items && data.items.length > 0) {
                return data.items[0].snippet.channelId;
            }
            
            throw new Error('Channel not found. Please verify the handle is correct.');
        }

        // API Call 2: Fetch Latest Videos
        async function fetchLatestVideos() {
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&type=video&order=date&maxResults=12&key=${API_KEY}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`API Error: ${response.status}`);
            return await response.json();
        }

        // API Call 2b: Fetch Full Catalog (Max 50 limit via API)
        async function fetchFullCatalog() {
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&type=video&order=date&maxResults=50&key=${API_KEY}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`API Error: ${response.status}`);
            return await response.json();
        }

        // API Call 3: Fetch Algorithmic Recommendations from SAME channel
        async function fetchRelatedChannelVideos(videoTitle) {
            // Clean title to use as search query (remove special chars, use first main part)
            const cleanQuery = videoTitle.split('|')[0].replace(/[^\w\s]/gi, '').trim();
            
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&q=${encodeURIComponent(cleanQuery)}&type=video&order=relevance&maxResults=13&key=${API_KEY}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`API Error: ${response.status}`);
            return await response.json();
        }

        // Action: Play specific video and optionally fetch recommendations
        async function playVideo(videoId, title, shouldAutoplay = true, fetchRecommendations = false) {
            currentlyPlayingId = videoId;
            
            const origin = window.location.origin !== 'null' ? window.location.origin : 'https://example.com';
            const autoplayParam = shouldAutoplay ? '1' : '0';

            ytPlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=${autoplayParam}&rel=0&modestbranding=1&enablejsapi=1&origin=${encodeURIComponent(origin)}`;
            
            currentTitleEl.textContent = decodeHTML(title);
            currentTitleEl.title = decodeHTML(title);

            // Fetch algorithm recommendations if requested
            if (fetchRecommendations) {
                try {
                    showLoading("Calculating channel algorithm...");
                    gridSectionTitle.textContent = "Similar Algorithmic Tracks";
                    
                    const relatedData = await fetchRelatedChannelVideos(title);
                    
                    if (relatedData.items && relatedData.items.length > 0) {
                        // Filter out the video we just clicked
                        const filteredItems = relatedData.items.filter(item => item.id.videoId !== videoId).slice(0, 12);
                        renderVideos(filteredItems, false);
                    } else {
                        grid.innerHTML = `<div class="message-box">No algorithmic similarities found.</div>`;
                    }
                } catch (e) {
                    console.error("Failed to fetch recommendations:", e);
                    showError("Failed to load recommendations.");
                }
            } else {
                // Just update active state if not fetching new grid
                document.querySelectorAll('.video-card').forEach(card => {
                    if (card.dataset.id === videoId) {
                        card.classList.add('active');
                    } else {
                        card.classList.remove('active');
                    }
                });
            }
        }

        // UI: Render Video Cards
        function renderVideos(items, isInitial = false) {
            grid.innerHTML = ''; 

            items.forEach((item, index) => {
                const videoId = item.id.videoId;
                const snippet = item.snippet;
                const title = decodeHTML(snippet.title);
                const thumbnail = snippet.thumbnails.medium ? snippet.thumbnails.medium.url : snippet.thumbnails.default.url;
                
                const card = document.createElement('div');
                card.className = 'video-card';
                card.dataset.id = videoId;
                
                // On absolute first load, set up the player but don't fetch recommendations to avoid loops
                if (isInitial && index === 0) {
                    playVideo(videoId, title, false, false);
                    card.classList.add('active');
                } else if (videoId === currentlyPlayingId) {
                    card.classList.add('active');
                }

                card.innerHTML = `
                    <div class="thumbnail-wrapper">
                        <img src="${thumbnail}" alt="Thumbnail for ${title}" loading="lazy">
                    </div>
                    <div class="card-info">
                        <div class="card-title">${title}</div>
                        <div class="card-date">${formatDate(snippet.publishedAt)}</div>
                    </div>
                `;

                card.addEventListener('click', () => {
                    // When clicked, play video AND fetch algorithmic recommendations
                    playVideo(videoId, title, true, true);
                    
                    // Scroll up to player smoothly
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });

                grid.appendChild(card);
            });
        }

        // Main Execution Flow
        async function initPlayer() {
            try {
                showLoading();

                if (!channelId) {
                    channelId = await fetchChannelId();
                }

                const data = await fetchLatestVideos();
                
                if (data.items && data.items.length > 0) {
                    renderVideos(data.items, true);
                } else {
                    grid.innerHTML = `<div class="message-box">No videos found on this channel.</div>`;
                }

                isInitialLoad = false;

            } catch (error) {
                console.error("Error loading content:", error);
                showError(error.message);
            }
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            initPlayer();
        });

        // Event Listener: Load Full Catalog internally
        btnFullCatalog.addEventListener('click', async () => {
            try {
                showLoading("Accessing full archives...");
                gridSectionTitle.textContent = "Complete Catalog";
                
                if (!channelId) {
                    channelId = await fetchChannelId();
                }
                
                const data = await fetchFullCatalog();
                if (data.items && data.items.length > 0) {
                    renderVideos(data.items, false);
                    // Scroll down to the grid smoothly
                    document.querySelector('.main-content').scrollIntoView({ behavior: 'smooth' });
                } else {
                    grid.innerHTML = `<div class="message-box">No videos found.</div>`;
                }
            } catch (error) {
                console.error("Error loading full catalog:", error);
                showError("Failed to load catalog.");
            }
        });

    </script>
</body>
</html>
