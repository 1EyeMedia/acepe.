<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoic Ambience | @meditations.acepe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #070908;
            --accent-color: #3d7a56;
            --accent-hover: #4e9c6e;
            --accent-glow: rgba(61, 122, 86, 0.25);
            --text-main: #f0f0f0;
            --text-muted: #8a8f8d;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.08);
            
            --font-heading: 'Syne', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-mono);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Orbs */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 50vw;
            height: 50vw;
            background-color: var(--accent-color);
            top: -20%;
            left: -10%;
        }

        .orb-2 {
            width: 40vw;
            height: 40vw;
            background-color: #142e20;
            bottom: -10%;
            right: -10%;
            animation-delay: -5s;
            animation-direction: alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.9); }
        }

        /* Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 3rem;
            align-items: start;
        }

        /* Sidebar / Header */
        .sidebar {
            position: sticky;
            top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .warning-bar {
            background-color: var(--accent-color);
            color: var(--bg-color);
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-weight: 700;
            letter-spacing: 0.05em;
            display: inline-block;
            align-self: flex-start;
        }

        header h1 {
            font-family: var(--font-heading);
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            border-left: 2px solid var(--accent-color);
            padding-left: 1rem;
        }

        /* Player Section */
        .player-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .now-playing {
            padding: 1.25rem;
            border-top: 1px solid var(--border);
        }

        .now-playing-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--accent-color);
            letter-spacing: 0.1em;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pulse {
            width: 6px;
            height: 6px;
            background-color: var(--accent-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 var(--accent-glow); }
            70% { box-shadow: 0 0 0 6px rgba(61, 122, 86, 0); }
            100% { box-shadow: 0 0 0 0 rgba(61, 122, 86, 0); }
        }

        .current-title {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Grid Section */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .section-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .video-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .video-card:hover, .video-card.active {
            border-color: var(--accent-color);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px var(--accent-glow);
            background: var(--surface-hover);
        }

        .thumbnail-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            background: #111;
        }

        .thumbnail-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .video-card:hover .thumbnail-wrapper img {
            opacity: 0.8;
        }

        .card-info {
            padding: 1rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-title {
            font-family: var(--font-heading);
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Buttons & States */
        .btn-load-more {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--accent-color);
            padding: 1rem 2rem;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            align-self: center;
            margin-top: 1rem;
        }

        .btn-load-more:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .hidden {
            display: none !important;
        }

        .message-box {
            grid-column: 1 / -1;
            padding: 2rem;
            text-align: center;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 8px;
            color: #ff8888;
        }

        .loading-spinner {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: var(--accent-color);
            font-size: 1.2rem;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: relative;
                top: 0;
            }
        }
        @media (max-width: 600px) {
            header h1 { font-size: 2.5rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="container">
        <!-- Sticky Sidebar / Header & Player -->
        <aside class="sidebar">
            <header>
                <div class="warning-bar">channel is locked, no rabbit holes</div>
                <h1 style="margin-top: 1.5rem;">Stoic Ambience.</h1>
                <p class="subtitle">// @meditations.acepe<br>· no algorithm<br>· no escape<br>· just work</p>
            </header>

            <div class="player-container">
                <div class="video-wrapper">
                    <iframe id="yt-player" 
                            src="" 
                            title="YouTube video player" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowfullscreen>
                    </iframe>
                </div>
                <div class="now-playing">
                    <div class="now-playing-label">
                        <div class="pulse"></div> Now Playing
                    </div>
                    <div id="current-title" class="current-title">Initializing...</div>
                </div>
            </div>
        </aside>

        <!-- Main Content Grid -->
        <main class="main-content">
            <h2 class="section-title">Archive</h2>
            <div id="video-grid" class="grid">
                <!-- Videos injected here via JS -->
            </div>
            <button id="load-more-btn" class="btn-load-more hidden">Load More</button>
        </main>
    </div>

    <script>
        // Configuration
        const API_KEY = 'AIzaSyCubEB4VWGofjhJli1FAf2L4hmyq5WN8Gc';
        const CHANNEL_HANDLE = '@meditations.acepe';
        
        // State
        let channelId = null;
        let nextPageToken = null;
        let isInitialLoad = true;
        let currentlyPlayingId = null;

        // DOM Elements
        const grid = document.getElementById('video-grid');
        const loadMoreBtn = document.getElementById('load-more-btn');
        const ytPlayer = document.getElementById('yt-player');
        const currentTitleEl = document.getElementById('current-title');

        // Helper: Decode HTML entities in YouTube titles
        function decodeHTML(html) {
            const txt = document.createElement('textarea');
            txt.innerHTML = html;
            return txt.value;
        }

        // Helper: Format Dates
        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        // UI: Show Error
        function showError(message) {
            grid.innerHTML = `<div class="message-box">Error: ${message}</div>`;
            loadMoreBtn.classList.add('hidden');
            if (isInitialLoad) currentTitleEl.textContent = "Offline.";
        }

        // UI: Show Loading
        function showLoading() {
            if (isInitialLoad) {
                grid.innerHTML = `<div class="loading-spinner">Connecting to the void...</div>`;
            } else {
                loadMoreBtn.textContent = "Loading...";
                loadMoreBtn.disabled = true;
            }
        }

        // API Call 1: Get Channel ID from Handle
        async function fetchChannelId() {
            // First try the channels endpoint with forHandle (ensuring it has an @ symbol)
            const cleanHandle = CHANNEL_HANDLE.startsWith('@') ? CHANNEL_HANDLE : `@${CHANNEL_HANDLE}`;
            let url = `https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${cleanHandle}&key=${API_KEY}`;
            let response = await fetch(url);
            
            if (!response.ok) throw new Error(`API Error: ${response.status}`);
            
            let data = await response.json();
            if (data.items && data.items.length > 0) {
                return data.items[0].id;
            }
            
            // Fallback: Search API to find the channel (useful if handle is new or forHandle fails)
            url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(CHANNEL_HANDLE)}&type=channel&maxResults=1&key=${API_KEY}`;
            response = await fetch(url);
            
            if (!response.ok) throw new Error(`API Error: ${response.status}`);
            
            data = await response.json();
            if (data.items && data.items.length > 0) {
                return data.items[0].snippet.channelId;
            }
            
            throw new Error('Channel not found. Please verify the handle is correct.');
        }

        // API Call 2: Fetch Videos from Channel
        async function fetchVideos(pageToken = '') {
            const tokenParam = pageToken ? `&pageToken=${pageToken}` : '';
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&type=video&order=date&maxResults=24&key=${API_KEY}${tokenParam}`;
            
            const response = await fetch(url);
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || `API Error: ${response.status}`);
            }
            
            return await response.json();
        }

        // Action: Play specific video
        function playVideo(videoId, title, shouldAutoplay = true) {
            currentlyPlayingId = videoId;
            
            // Generate a safe origin for the YouTube player (prevents iframe sandbox configuration errors)
            const origin = window.location.origin !== 'null' ? window.location.origin : 'https://example.com';
            const autoplayParam = shouldAutoplay ? '1' : '0';

            // rel=0 prevents showing recommended videos from other channels at the end
            // modestbranding=1 removes the YouTube logo
            // origin and enablejsapi prevent configuration errors in strict environments
            ytPlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=${autoplayParam}&rel=0&modestbranding=1&enablejsapi=1&origin=${encodeURIComponent(origin)}`;
            
            currentTitleEl.textContent = decodeHTML(title);
            currentTitleEl.title = decodeHTML(title);

            // Update UI active state on cards
            document.querySelectorAll('.video-card').forEach(card => {
                if (card.dataset.id === videoId) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            });
        }

        // UI: Render Video Cards
        function renderVideos(items) {
            if (isInitialLoad) grid.innerHTML = ''; // clear loading spinner

            items.forEach((item, index) => {
                const videoId = item.id.videoId;
                const snippet = item.snippet;
                const title = decodeHTML(snippet.title);
                const thumbnail = snippet.thumbnails.medium ? snippet.thumbnails.medium.url : snippet.thumbnails.default.url;
                
                const card = document.createElement('div');
                card.className = 'video-card';
                card.dataset.id = videoId;
                
                // If it's the very first video loaded, set it in the player but DON'T autoplay
                // (Browsers block unmuted autoplay without prior user interaction)
                if (isInitialLoad && index === 0) {
                    playVideo(videoId, title, false);
                    card.classList.add('active');
                }

                card.innerHTML = `
                    <div class="thumbnail-wrapper">
                        <img src="${thumbnail}" alt="Thumbnail for ${title}" loading="lazy">
                    </div>
                    <div class="card-info">
                        <div class="card-title">${title}</div>
                        <div class="card-date">${formatDate(snippet.publishedAt)}</div>
                    </div>
                `;

                card.addEventListener('click', () => {
                    playVideo(videoId, title, true);
                    // Scroll to top on mobile when selecting a video
                    if (window.innerWidth <= 1024) {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });

                grid.appendChild(card);
            });
        }

        // Main Execution Flow
        async function loadContent(pageToken = '') {
            try {
                showLoading();

                // 1. Get channel ID if we don't have it yet
                if (!channelId) {
                    channelId = await fetchChannelId();
                }

                // 2. Fetch videos
                const data = await fetchVideos(pageToken);
                
                // 3. Render
                if (data.items && data.items.length > 0) {
                    renderVideos(data.items);
                } else if (isInitialLoad) {
                    grid.innerHTML = `<div class="message-box">No videos found on this channel.</div>`;
                }

                // 4. Handle Pagination
                nextPageToken = data.nextPageToken;
                if (nextPageToken) {
                    loadMoreBtn.classList.remove('hidden');
                    loadMoreBtn.textContent = "Load More";
                    loadMoreBtn.disabled = false;
                } else {
                    loadMoreBtn.classList.add('hidden');
                }

                isInitialLoad = false;

            } catch (error) {
                console.error("Error loading content:", error);
                showError(error.message);
            }
        }

        // Event Listeners
        loadMoreBtn.addEventListener('click', () => {
            if (nextPageToken) {
                loadContent(nextPageToken);
            }
        });

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            loadContent();
        });

    </script>
</body>
</html>
